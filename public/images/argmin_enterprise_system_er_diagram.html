<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argmin Enterprise System Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --bg:#0F172A;--surface:#1E293B;--elevated:#334155;--border:#475569;
  --t1:#F8FAFC;--t2:#CBD5E1;--t3:#94A3B8;--t4:#64748B;
}
[data-theme="light"] {
  --bg:#F8FAFC;--surface:#F1F5F9;--elevated:#E2E8F0;--border:#E2E8F0;
  --t1:#0F172A;--t2:#475569;--t3:#64748B;--t4:#94A3B8;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);transition:background .3s,color .3s;line-height:1.5}

.hdr{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--bg) 95%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 28px 12px}
.hdr h1{font-size:20px;font-weight:600;letter-spacing:-0.01em;margin:0}
.hdr .purpose{font-size:12px;color:var(--t3);margin:4px 0 0;max-width:680px;line-height:1.45}
.hdr .stats{font:10px/1 'JetBrains Mono',monospace;color:var(--t4);margin-top:8px}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--t2);font:11px/1.2 'Inter',sans-serif;cursor:pointer;transition:all .12s}
.btn:hover{background:var(--elevated);color:var(--t1)}
.search{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--t1);font:12px/1.4 'Inter',sans-serif;outline:none;width:190px}
.search:focus{border-color:#2563EB}
.search::placeholder{color:var(--t4)}

.legend-panel{margin-top:10px;padding:10px 14px;background:var(--surface);border-radius:8px;border:1px solid var(--border);display:none;gap:16px;flex-wrap:wrap}
.legend-panel.open{display:flex}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend-count{font:9px/1 'JetBrains Mono',monospace;color:var(--t4)}

.sig-bar{position:sticky;top:70px;z-index:99;background:color-mix(in srgb,var(--bg) 95%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sig-label{font:9px/1 'JetBrains Mono',monospace;color:var(--t4);text-transform:uppercase;letter-spacing:.06em}
.sig-pill{padding:3px 10px;border-radius:12px;font:10px/1.3 'Inter',sans-serif;cursor:pointer;border:1px solid transparent;transition:all .15s;opacity:.3}
.sig-pill.on{opacity:1}

.main{padding:0 28px 40px}

.zone-section{margin-bottom:8px}
.flow-arrow{display:flex;align-items:center;gap:8px;padding:6px 0 2px 20px}
.flow-arrow svg{flex-shrink:0}
.flow-arrow span{font-size:10px;font-style:italic;line-height:1.3}

.zone-header{margin-bottom:14px;padding:8px 0}
.zone-header.focal{padding:12px 16px;border-radius:10px}
.zone-title{font-size:13px;font-weight:600;letter-spacing:-0.005em}
.zone-title.focal{font-size:15px}
.zone-sub{font-size:10px;color:var(--t4);margin-top:1px}
.zone-desc{font-size:11px;color:var(--t3);margin-top:4px;padding-left:20px;line-height:1.4}

.cluster-grid{display:grid;gap:10px;margin-bottom:8px}
.cluster-grid.focal{grid-template-columns:repeat(3,1fr)}
.cluster-grid.standard{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}

.card{border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s ease;border-left:3px solid transparent}
.card:hover{transform:translateY(-1px)}
.card-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3}
.card-title.focal{font-size:14px}
.card-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center}
.card-meta span{font:10px/1.3 'JetBrains Mono',monospace}
.card-badge{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;color:#fff;flex-shrink:0}
.card-arrow{font-size:10px;color:var(--t4);transition:transform .2s}
.card-arrow.open{transform:rotate(180deg)}

.entity-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.entity-row{display:flex;align-items:flex-start;gap:6px;padding:3px 0}
.entity-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;margin-top:3px}
.entity-name{font:11px/1.4 'JetBrains Mono',monospace}
.entity-name.fc{font-weight:600;color:var(--t1)}
.entity-fc{font-size:8px;color:#D97706;margin-left:5px;font-weight:600}
.entity-desc{font-size:10px;color:var(--t4);margin-top:1px;line-height:1.35}
</style>
</head>

  </div>
  <div class="stats" id="stats"></div>
  <div class="legend-panel" id="legend"></div>
</div>

<div class="sig-bar" id="sig-bar"><span class="sig-label">Filter</span></div>
<div class="main" id="main"></div>

    { id: "NAMING_COLLISION_SERVICE", s: "CONFOUNDER", fc: false, d: "Services named ai-* or ml-* but not doing LLM inference" },

  ]},

const expanded = new Set();
const activeSigs = new Set(Object.keys(SIG_COLORS));

// Stats
let totalE = 0, totalFC = 0;
CLUSTERS.forEach(c => { totalE += c.entities.length; c.entities.forEach(e => { if (e.fc) totalFC++; }); });
document.getElementById("stats").textContent =
  totalE + " entities \u00b7 " + CLUSTERS.length + " domains \u00b7 " +
  totalFC + " first-class \u00b7 4 trust boundaries \u00b7 7 signal classes";

// Legend
const leg = document.getElementById("legend");
Object.entries(SIG_LABELS).forEach(([sig, label]) => {
  const ct = CLUSTERS.reduce((a, c) => a + c.entities.filter(e => e.s === sig).length, 0);
  const d = document.createElement("div");
  d.className = "legend-item";
  d.innerHTML = '<div class="legend-dot" style="background:' + SIG_COLORS[sig] + '"></div>' +
    label + ' <span class="legend-count">' + ct + '</span>';
  leg.appendChild(d);
});

document.getElementById("legend-btn").onclick = () => {
  leg.classList.toggle("open");
};

// Signal pills
const sigBar = document.getElementById("sig-bar");
Object.entries(SIG_LABELS).forEach(([sig, label]) => {
  const p = document.createElement("span");
  p.className = "sig-pill on";
  p.style.color = SIG_COLORS[sig];
  p.style.background = SIG_COLORS[sig] + "14";
  p.style.borderColor = SIG_COLORS[sig] + "88";
  p.textContent = label;
  p.onclick = () => {
    if (activeSigs.has(sig)) { activeSigs.delete(sig); p.classList.remove("on"); p.style.borderColor = "transparent"; }
    else { activeSigs.add(sig); p.classList.add("on"); p.style.borderColor = SIG_COLORS[sig] + "88"; }
    render();
  };
  sigBar.appendChild(p);
});

function render() {
  const q = document.getElementById("search").value.toLowerCase().replace(/\s+/g, "_");
  const main = document.getElementById("main");
  main.innerHTML = "";

  ZONES.forEach((zone, zi) => {
    const zc = CLUSTERS.filter(c => c.zone === zone.id).map(c => ({
      ...c,
      filteredEntities: c.entities.filter(e => {
        if (!activeSigs.has(e.s)) return false;
        if (q && !e.id.toLowerCase().includes(q) && !e.d.toLowerCase().includes(q.replace(/_/g, " "))) return false;
        return true;
      })
    })).filter(c => c.filteredEntities.length > 0);
    if (!zc.length) return;

    const isFocal = zone.id === "ARGMIN_PLATFORM";
    const section = document.createElement("div");
    section.className = "zone-section";

    // Flow arrow between zones
    if (zi > 0) {
      section.innerHTML +=
        '<div class="flow-arrow">' +
          '<svg width="32" height="20" viewBox="0 0 32 20"><line x1="0" y1="10" x2="24" y2="10" stroke="' + zone.color + '" stroke-width="1.5" stroke-dasharray="4,3"/><polygon points="24,5 32,10 24,15" fill="' + zone.color + '" opacity="0.6"/></svg>' +
          '<span style="color:' + zone.color + '">' + zone.flow + '</span>' +
        '</div>';
    }

    // Zone header
    const hdrStyle = isFocal
      ? 'background:' + zone.color + '08;border:1px solid ' + zone.color + '20;border-radius:10px;padding:12px 16px'
      : 'padding:8px 0';
    section.innerHTML +=
      '<div class="zone-header" style="margin-top:' + (zi === 0 ? 24 : 12) + 'px;margin-bottom:14px;' + hdrStyle + '">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          '<div style="width:10px;height:10px;border-radius:3px;background:' + zone.color + ';flex-shrink:0"></div>' +
          '<div>' +
            '<div class="zone-title' + (isFocal ? ' focal' : '') + '" style="color:' + zone.color + '">' + zone.label + '</div>' +
            '<div class="zone-sub">' + zone.sub + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="zone-desc">' + zone.desc + '</div>' +
      '</div>';

    // Grid
    const grid = document.createElement("div");
    grid.className = "cluster-grid " + (isFocal ? "focal" : "standard");

    zc.forEach(cluster => {
      const isExp = expanded.has(cluster.id);
      let fcCt = 0;
      cluster.filteredEntities.forEach(e => { if (e.fc) fcCt++; });

      const card = document.createElement("div");
      card.className = "card";
      card.style.borderLeftColor = cluster.color;
      card.style.border = "1px solid " + cluster.color + "22";
      card.style.borderLeftWidth = "3px";
      card.style.background = cluster.color + "06";

      card.onmouseenter = () => { card.style.background = cluster.color + "10"; card.style.borderColor = cluster.color + "55"; card.style.boxShadow = "0 4px 20px " + cluster.color + "12"; };
      card.onmouseleave = () => { card.style.background = cluster.color + "06"; card.style.borderColor = cluster.color + "22"; card.style.boxShadow = "none"; };

      let h = '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">' +
        '<div style="flex:1;min-width:0">' +
          '<div class="card-title' + (isFocal ? ' focal' : '') + '">' + cluster.label + '</div>' +
          '<div class="card-meta">' +
            '<span style="color:var(--t3)">' + cluster.filteredEntities.length + ' entities</span>' +
            (fcCt > 0 ? '<span style="color:#D97706;font-weight:600">' + fcCt + ' first-class</span>' : '') +
          '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">' +
          '<div class="card-badge" style="width:' + (isFocal ? 28 : 24) + 'px;height:' + (isFocal ? 28 : 24) + 'px;background:' + cluster.color + ';font-size:' + (isFocal ? 11 : 10) + 'px">' + cluster.filteredEntities.length + '</div>' +
          '<span class="card-arrow ' + (isExp ? 'open' : '') + '">&#9660;</span>' +
        '</div>' +
      '</div>';

      if (isExp) {
        h += '<div class="entity-list">';
        cluster.filteredEntities.forEach(e => {
          h += '<div class="entity-row">' +
            '<div class="entity-dot" style="background:' + SIG_COLORS[e.s] + '"></div>' +
            '<div style="min-width:0">' +
              '<span class="entity-name ' + (e.fc ? 'fc' : '') + '" style="color:' + (e.fc ? 'var(--t1)' : 'var(--t2)') + '">' + e.id.replace(/_/g, " ") + '</span>' +
              (e.fc ? '<span class="entity-fc">FIRST-CLASS</span>' : '') +
              '<div class="entity-desc">' + e.d + '</div>' +
            '</div>' +
          '</div>';
        });
        h += '</div>';
      }

      card.innerHTML = h;
      card.onclick = () => { if (expanded.has(cluster.id)) expanded.delete(cluster.id); else expanded.add(cluster.id); render(); };
      grid.appendChild(card);
    });

    section.appendChild(grid);
    main.appendChild(section);
  });
}

// Controls
document.getElementById("expand-all").onclick = () => { CLUSTERS.forEach(c => expanded.add(c.id)); render(); };
document.getElementById("collapse-all").onclick = () => { expanded.clear(); render(); };
document.getElementById("theme-btn").onclick = function() {
  const isL = document.documentElement.getAttribute("data-theme") === "light";
  document.documentElement.setAttribute("data-theme", isL ? "" : "light");
  this.textContent = isL ? "Light" : "Dark";
};
document.getElementById("search").addEventListener("input", render);
render();
</script>
