<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1170 810" role="img" aria-labelledby="landscape-title landscape-desc">
  <title id="landscape-title">AI operations competitive landscape</title>
  <desc id="landscape-desc">
    Two-axis competitive map. Vertical axis: post-hoc analytics at the bottom, decision-time intervention at the top. Horizontal axis: per-request visibility on the left, organizational attribution on the right. Existing categories cluster in the lower-left and lower-right; Argmin occupies the upper-right structural gap where workload-level intervention meets organizational attribution.
  </desc>

  <defs>
    <radialGradient id="lc-argmin-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EC4B6" stop-opacity="0.18" />
      <stop offset="60%" stop-color="#5EC4B6" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#5EC4B6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="lc-gap-zone" x1="0.5" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EC4B6" stop-opacity="0" />
      <stop offset="40%" stop-color="#5EC4B6" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#5EC4B6" stop-opacity="0.08" />
    </linearGradient>
    <style>
      .bg {
        fill: #F8F8F6;
        stroke: #D7DEE8;
        stroke-width: 1.5;
      }
      .panel {
        fill: #FBFCFE;
        stroke: #E3E9F0;
        stroke-width: 1;
      }
      .axis { stroke: #B8C3D3; stroke-width: 1.5; }
      .axis-arrow { fill: #B8C3D3; }
      .quad { stroke: #D7DEE8; stroke-width: 0.75; stroke-dasharray: 4 4; }
      .axis-label-strong {
        fill: #111111;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .axis-label-dim {
        fill: #6B7A90;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .cat-label {
        fill: #7A8599;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .pill {
        fill: #FFFFFF;
        stroke: #D7DEE8;
        stroke-width: 1;
      }
      .pill-text {
        fill: #111111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 14px;
        font-weight: 400;
      }
      .argmin-pill {
        fill: rgba(94, 196, 182, 0.12);
        stroke: #5EC4B6;
        stroke-width: 2.5;
      }
      .argmin-text {
        fill: #5EC4B6;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .argmin-sub {
        fill: #5EC4B6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        opacity: 0.85;
      }
      .gap-stroke {
        fill: none;
        stroke: #5EC4B6;
        stroke-width: 1;
        stroke-dasharray: 6 4;
        opacity: 0.4;
      }
      .gap-label {
        fill: #5EC4B6;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.7;
      }
      .layer-bracket {
        stroke: #A7B4C8;
        stroke-width: 1;
      }
      .layer-bracket-strong {
        stroke: #5EC4B6;
        stroke-width: 1;
      }
      .layer-num-dim {
        fill: #7A8599;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.14em;
      }
      .layer-num-strong {
        fill: #5EC4B6;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.14em;
      }
      .layer-name {
        fill: #6B7A90;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 9.5px;
        font-weight: 400;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1170" height="810" rx="28" class="bg" />
  <rect x="160" y="100" width="880" height="660" rx="3" class="panel" />
  <rect x="630" y="100" width="410" height="340" rx="3" fill="url(#lc-gap-zone)" />

  <line x1="600" y1="100" x2="600" y2="760" class="quad" />
  <line x1="160" y1="430" x2="1040" y2="430" class="quad" />

  <line x1="160" y1="760" x2="160" y2="100" class="axis" />
  <polygon points="160,100 155,112 165,112" class="axis-arrow" />
  <line x1="160" y1="760" x2="1040" y2="760" class="axis" />
  <polygon points="1040,760 1028,755 1028,765" class="axis-arrow" />

  <text x="72" y="130" text-anchor="middle" class="axis-label-strong">Decision-time</text>
  <text x="72" y="146" text-anchor="middle" class="axis-label-strong">intervention</text>
  <text x="72" y="730" text-anchor="middle" class="axis-label-dim">Post-hoc</text>
  <text x="72" y="746" text-anchor="middle" class="axis-label-dim">analytics</text>

  <text x="200" y="790" text-anchor="start" class="axis-label-dim">Per-request visibility</text>
  <text x="1000" y="790" text-anchor="end" class="axis-label-strong">Organizational attribution</text>

  <text x="305" y="558" text-anchor="middle" class="cat-label">LLM Observability</text>
  <text x="330" y="368" text-anchor="middle" class="cat-label">LLM Evaluation</text>
  <text x="485" y="215" text-anchor="middle" class="cat-label">AI Gateways</text>
  <text x="690" y="510" text-anchor="middle" class="cat-label">Enterprise APM</text>
  <text x="665" y="640" text-anchor="middle" class="cat-label">Cloud FinOps</text>

  <rect x="213" y="576" width="145" height="40" rx="20" class="pill" />
  <text x="286" y="600" text-anchor="middle" dominant-baseline="central" class="pill-text">Arize Phoenix</text>

  <rect x="240" y="625" width="115" height="40" rx="20" class="pill" />
  <text x="298" y="649" text-anchor="middle" dominant-baseline="central" class="pill-text">Langfuse</text>

  <rect x="370" y="596" width="125" height="40" rx="20" class="pill" />
  <text x="433" y="620" text-anchor="middle" dominant-baseline="central" class="pill-text">LangSmith</text>

  <rect x="224" y="680" width="120" height="40" rx="20" class="pill" />
  <text x="284" y="704" text-anchor="middle" dominant-baseline="central" class="pill-text">W&amp;B Weave</text>

  <rect x="265" y="382" width="130" height="40" rx="20" class="pill" />
  <text x="330" y="406" text-anchor="middle" dominant-baseline="central" class="pill-text">Braintrust</text>

  <rect x="420" y="286" width="115" height="40" rx="20" class="pill" />
  <text x="478" y="310" text-anchor="middle" dominant-baseline="central" class="pill-text">Helicone</text>

  <rect x="448" y="228" width="105" height="40" rx="20" class="pill" />
  <text x="501" y="252" text-anchor="middle" dominant-baseline="central" class="pill-text">Portkey</text>

  <rect x="630" y="524" width="120" height="40" rx="20" class="pill" />
  <text x="690" y="548" text-anchor="middle" dominant-baseline="central" class="pill-text">Datadog</text>

  <rect x="586" y="656" width="158" height="40" rx="20" class="pill" />
  <text x="665" y="680" text-anchor="middle" dominant-baseline="central" class="pill-text" style="font-size:13px">Apptio / Kubecost</text>

  <ellipse cx="895" cy="210" rx="140" ry="85" fill="url(#lc-argmin-glow)" />
  <rect x="810" y="186" width="170" height="48" rx="24" class="argmin-pill" />
  <text x="895" y="214" text-anchor="middle" dominant-baseline="central" class="argmin-text">Argmin</text>
  <text x="895" y="258" text-anchor="middle" class="argmin-sub">Organizational attribution</text>
  <text x="895" y="274" text-anchor="middle" class="argmin-sub">+ decision-time control</text>

  <line x1="1055" y1="580" x2="1055" y2="760" class="layer-bracket" />
  <line x1="1050" y1="580" x2="1060" y2="580" class="layer-bracket" />
  <line x1="1050" y1="760" x2="1060" y2="760" class="layer-bracket" />
  <text x="1068" y="666" class="layer-num-dim">LAYER 1</text>
  <text x="1068" y="680" class="layer-name">Measurement</text>

  <line x1="1055" y1="380" x2="1055" y2="570" class="layer-bracket" />
  <line x1="1050" y1="380" x2="1060" y2="380" class="layer-bracket" />
  <line x1="1050" y1="570" x2="1060" y2="570" class="layer-bracket" />
  <text x="1068" y="471" class="layer-num-dim">LAYER 2</text>
  <text x="1068" y="485" class="layer-name">Attribution</text>

  <line x1="1055" y1="100" x2="1055" y2="370" class="layer-bracket-strong" />
  <line x1="1050" y1="100" x2="1060" y2="100" class="layer-bracket-strong" />
  <line x1="1050" y1="370" x2="1060" y2="370" class="layer-bracket-strong" />
  <text x="1068" y="231" class="layer-num-strong">LAYER 3</text>
  <text x="1068" y="245" class="layer-name">Intervention</text>

  <rect x="630" y="105" width="405" height="325" rx="8" class="gap-stroke" />
  <text x="832" y="136" text-anchor="middle" class="gap-label">Structural gap</text>
</svg>
