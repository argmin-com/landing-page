version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    ignore:
      # TypeScript 6.x is blocked until @astrojs/check ships a compatible
      # release — its peer dep is currently "^5.0.0" and `astro check` in
      # CI fails at the type-check step with TS 6. See the closing comment
      # on #57 and the prior fix commit b98bb71 for full context.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      # First-party actions maintained by the same org land in one PR per
      # week — low blast radius, easy to revert together.
      actions-core:
        patterns:
          - "actions/*"
      github-core:
        patterns:
          - "github/*"
      # Third-party actions (e.g., lycheeverse/lychee-action,
      # browser-actions/setup-chrome) get individual PRs so a regression
      # in one can be reverted without touching the others.
