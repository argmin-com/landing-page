name: Link check

on:
  push:
    branches:
      - main
    paths:
      - public/**
      - src/**
      - .github/workflows/link-check.yml
  pull_request:
    branches:
      - main
    paths:
      - public/**
      - src/**
      - .github/workflows/link-check.yml
  schedule:
    # Weekly on Mondays at 08:00 UTC to catch externally-broken links
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Run lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Link check with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,307,308,403,429
            --exclude-path dist/_astro
            --exclude "^https?://(localhost|127\.0\.0\.1)"
            --exclude "^mailto:"
            --exclude "^https?://argmin\.co"
            './dist/**/*.html'
          fail: true
          format: markdown
          output: ./lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lychee-report-${{ github.sha }}
          path: lychee-report.md
          if-no-files-found: ignore
          retention-days: 14
