name: Visual regression

on:
  pull_request:
    branches: [main]
    paths:
      - src/**
      - public/**
      - package.json
      - package-lock.json

permissions:
  contents: read

concurrency:
  group: visual-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Screenshot comparison
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx --yes playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Serve dist
        run: |
          python3 -m http.server 4173 -d dist &
          for i in $(seq 1 15); do curl -fsS http://127.0.0.1:4173/ >/dev/null 2>&1 && break; sleep 1; done

      - name: Run screenshot tests
        id: screenshots
        continue-on-error: true
        run: npx playwright test --config=playwright.config.mjs --update-snapshots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ github.sha }}
          path: |
            tests/visual/__screenshots__/
            test-results/
          retention-days: 14

      - name: Annotate result
        if: steps.screenshots.outcome == 'failure'
        run: echo "::warning::Visual regression tests failed or generated new baselines — review uploaded artifacts"
