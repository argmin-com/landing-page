name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Check deploy configuration
    runs-on: ubuntu-latest

    steps:
      - name: Check Cloudflare deployment credentials
        id: cloudflare
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Deploy"
              echo
              echo "- Cloudflare Pages credentials detected."
              echo "- This workflow will build and deploy the current main branch."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Deploy"
              echo
              echo "- Cloudflare Pages credentials are not configured for GitHub Actions."
              echo "- Skipping the manual deploy workflow."
              echo "- Cloudflare Pages Git integration remains the active deployment path."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
    outputs:
      enabled: ${{ steps.cloudflare.outputs.enabled }}

  deploy:
    name: Deploy to Cloudflare Pages
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://argmin.co

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build static site
        run: npm run build
        env:
          PUBLIC_FORMSPREE_URL: ${{ vars.PUBLIC_FORMSPREE_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=landing-page --branch="${GITHUB_REF_NAME}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
