name: Quality

on:
  push:
    branches:
      - main
    paths:
      - .env.example
      - .github/workflows/**
      - .nvmrc
      - README.md
      - astro.config.mjs
      - codex.md
      - docs/**
      - package.json
      - package-lock.json
      - public/**
      - scripts/**
      - src/**
      - tsconfig.json
  pull_request:
    branches:
      - main
    paths:
      - .env.example
      - .github/workflows/**
      - .nvmrc
      - README.md
      - astro.config.mjs
      - codex.md
      - docs/**
      - package.json
      - package-lock.json
      - public/**
      - scripts/**
      - src/**
      - tsconfig.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  site-audit:
    name: Site audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Astro diagnostics
        run: npm run check

      - name: Build fallback site
        run: npm run build

      - name: Validate contact fallbacks
        run: npm run validate:contact-fallbacks

      - name: Validate page structure
        run: npm run validate:page-structure

      - name: Validate design tokens
        run: npm run validate:design-tokens

      - name: Validate redirects
        run: npm run validate:redirects

      - name: Validate navbar
        run: npm run validate:navbar

      - name: Validate canonical URLs
        run: npm run validate:canonical

      - name: Validate anchor links
        run: npm run validate:anchor-links

      # Second build with Formspree configured to validate contact-configured path
      - name: Build configured contact site
        run: npm run build
        env:
          PUBLIC_FORMSPREE_URL: https://formspree.io/f/test000

      - name: Validate configured contact path
        run: npm run validate:contact-configured
        env:
          PUBLIC_FORMSPREE_URL: https://formspree.io/f/test000

      - name: Summarize build output
        run: |
          {
            echo "### Build output"
            echo
            echo '```text'
            du -ah dist | sort -h | tail -n 20
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Serve dist
        run: |
          python3 -m http.server 4173 -d dist >/tmp/landing-page-http.log 2>&1 &
          echo $! >/tmp/landing-page-http.pid

          server_ready=0
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              server_ready=1
              break
            fi
            sleep 1
          done

          if [ "$server_ready" -ne 1 ]; then
            echo "Static server did not start in time" >&2
            cat /tmp/landing-page-http.log >&2 || true
            exit 1
          fi

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Run Lighthouse (multi-route)
        run: |
          mkdir -p lighthouse
          ROUTES="/ /platform/ /use-cases/ /contact/ /security/ /about/ /team/"

          for route in $ROUTES; do
            slug=$(echo "$route" | sed 's|/|_|g; s|^_||')
            slug=${slug:-home}
            for run in 1 2 3; do
              echo "Lighthouse: ${route} (run ${run}/3)"
              npx --yes lighthouse@13.0.3 \
                "http://127.0.0.1:4173${route}" \
                --only-categories=performance,accessibility,best-practices,seo \
                --chrome-path="${{ steps.setup-chrome.outputs.chrome-path }}" \
                --chrome-flags="--headless=new --no-sandbox" \
                --quiet \
                --output=json \
                --output-path="./lighthouse/report-${slug}-${run}.json"
            done
          done

      - name: Enforce Lighthouse thresholds (per-route)
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readdirSync, readFileSync } from "node:fs";

          const median = (values) => {
            const sorted = [...values].sort((a, b) => a - b);
            return sorted[Math.floor(sorted.length / 2)];
          };

          const thresholds = {
            performance: 0.9,
            accessibility: 1,
            "best-practices": 1,
            seo: 1,
          };
          const budgets = { lcpMs: 2500, transferKb: 250 };

          // Group reports by route slug (report-{slug}-{run}.json)
          const allFiles = readdirSync("lighthouse")
            .filter((f) => /^report-.+-\d+\.json$/.test(f))
            .sort();
          const routeMap = new Map();
          for (const file of allFiles) {
            const slug = file.replace(/^report-/, "").replace(/-\d+\.json$/, "");
            if (!routeMap.has(slug)) routeMap.set(slug, []);
            routeMap.get(slug).push(JSON.parse(readFileSync(`lighthouse/${file}`, "utf8")));
          }

          // Fallback: legacy single-route naming (report-1.json)
          const legacyFiles = readdirSync("lighthouse")
            .filter((f) => /^report-\d+\.json$/.test(f))
            .sort();
          if (routeMap.size === 0 && legacyFiles.length > 0) {
            routeMap.set("home", legacyFiles.map((f) => JSON.parse(readFileSync(`lighthouse/${f}`, "utf8"))));
          }

          const failures = [];
          const summaryLines = ["### Lighthouse summary", ""];

          for (const [slug, reports] of routeMap) {
            summaryLines.push(`**${slug}**`);
            for (const [category, minScore] of Object.entries(thresholds)) {
              const scores = reports.map((r) => r.categories[category].score);
              const med = median(scores);
              if (med < minScore) {
                failures.push(`[${slug}] ${category} median ${med.toFixed(2)} < ${minScore.toFixed(2)}`);
              }
              summaryLines.push(`- ${category}: ${scores.map((s) => Math.round(s * 100)).join(", ")} (median ${Math.round(med * 100)})`);
            }
            const lcps = reports.map((r) => Math.round(r.audits["largest-contentful-paint"].numericValue));
            const lcpMed = median(lcps);
            if (lcpMed > budgets.lcpMs) {
              failures.push(`[${slug}] LCP median ${lcpMed} ms > ${budgets.lcpMs} ms`);
            }
            const xfers = reports.map((r) => Number((r.audits["total-byte-weight"].numericValue / 1024).toFixed(1)));
            const xferMed = median(xfers);
            if (xferMed > budgets.transferKb) {
              failures.push(`[${slug}] transfer ${xferMed.toFixed(1)} KB > ${budgets.transferKb} KB`);
            }
            summaryLines.push(`- LCP: ${lcps.join(", ")} ms (median ${lcpMed})`);
            summaryLines.push(`- transfer: ${xfers.map((v) => v.toFixed(1)).join(", ")} KB (median ${xferMed.toFixed(1)})`);
            summaryLines.push("");
          }

          appendFileSync(process.env.GITHUB_STEP_SUMMARY, summaryLines.join("\n") + "\n");

          if (failures.length > 0) {
            console.error(failures.join("\n"));
            process.exit(1);
          }
          NODE

      - name: Accessibility audit (pa11y)
        run: |
          ROUTES="/ /platform /use-cases /contact /security /about /team /privacy"
          FAIL=0
          for route in $ROUTES; do
            echo "::group::pa11y ${route}"
            npx --yes pa11y@8 \
              "http://127.0.0.1:4173${route}" \
              --runner=htmlcs \
              --standard=WCAG2AA \
              --ignore="WCAG2AA.Principle1.Guideline1_4.1_4_3.G18.Fail" \
              --timeout=15000 || FAIL=1
            echo "::endgroup::"
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::pa11y found accessibility issues on one or more routes (see logs above)"
            exit 1
          fi

      - name: Collect server logs
        if: always()
        run: |
          if [ -f /tmp/landing-page-http.log ]; then
            cp /tmp/landing-page-http.log lighthouse/http-server.log
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-${{ github.sha }}
          path: lighthouse
          if-no-files-found: error
          retention-days: 7

      - name: Stop static server
        if: always()
        run: |
          if [ -f /tmp/landing-page-http.pid ]; then
            kill "$(cat /tmp/landing-page-http.pid)" || true
          fi
