name: CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - .github/workflows/codeql.yml
      - .github/workflows/lighthouse.yml
      - .github/workflows/dependency-review.yml
      - astro.config.mjs
      - package.json
      - package-lock.json
      - scripts/**
      - public/**
      - src/**
      - tailwind.config.mjs
      - tsconfig.json
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - .github/workflows/codeql.yml
      - .github/workflows/lighthouse.yml
      - .github/workflows/dependency-review.yml
      - astro.config.mjs
      - package.json
      - package-lock.json
      - scripts/**
      - public/**
      - src/**
      - tailwind.config.mjs
      - tsconfig.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Astro diagnostics
        run: npm run check

      - name: Build static site
        run: npm run build

      - name: Validate contact fallbacks
        run: npm run validate:contact-fallbacks

      - name: Summarize build output
        run: |
          {
            echo "### Build output (Node ${{ matrix.node }})"
            echo
            echo '```text'
            du -ah dist | sort -h | tail -n 20
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dist artifact
        if: matrix.node == 20
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7
